<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Helios Settings</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --helios-bg-primary: #1a1a1a;
        --helios-bg-secondary: #222222;
        --helios-bg-tertiary: #2a2a2a;
        --helios-accent-orange: #ff7b54;
        --helios-accent-amber: #ffb347;
        --helios-accent-yellow: #ffd700;
        --helios-anki-blue: #2196f3;
        --helios-anki-success: #4caf50;
        --helios-anki-error: #f44336;
        --helios-text-primary: #ffffff;
        --helios-text-secondary: #f3f4f6;
        --helios-text-muted: #a1a1aa;
        --helios-border: #3a3a3a;
        --helios-shadow: rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: linear-gradient(
          135deg,
          var(--helios-bg-primary) 0%,
          var(--helios-bg-secondary) 50%,
          var(--helios-bg-primary) 100%
        );
        color: var(--helios-text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
            circle at 15% 15%,
            rgba(255, 123, 84, 0.03) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(33, 150, 243, 0.02) 0%,
            transparent 40%
          );
        pointer-events: none;
        z-index: -1;
      }

      /* Header */
      .header {
        background: linear-gradient(
          135deg,
          #ff6b35 0%,
          #ff8c42 20%,
          #ffb347 40%,
          #ffd700 60%,
          #ffeb3b 80%,
          #ff8c42 100%
        );
        padding: 40px 0;
        text-align: center;
        position: relative;
        box-shadow: 0 8px 32px rgba(255, 140, 66, 0.3);
      }

      .header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle at 30% 20%,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 50%
        );
        animation: headerShimmer 6s ease-in-out infinite alternate;
      }

      @keyframes headerShimmer {
        0% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }

      .header h1 {
        font-size: 48px;
        font-weight: 800;
        margin-bottom: 8px;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        letter-spacing: 3px;
        position: relative;
        z-index: 1;
      }

      .header .subtitle {
        font-size: 18px;
        font-weight: 600;
        opacity: 0.9;
        text-transform: uppercase;
        letter-spacing: 4px;
        position: relative;
        z-index: 1;
      }

      /* Container */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
        display: flex;
        gap: 30px;
      }

      /* Sidebar Navigation */
      .sidebar {
        width: 280px;
        flex-shrink: 0;
      }

      .nav-menu {
        background: linear-gradient(
          145deg,
          var(--helios-bg-secondary) 0%,
          var(--helios-bg-tertiary) 100%
        );
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 8px 32px var(--helios-shadow);
        border: 1px solid var(--helios-border);
        position: sticky;
        top: 20px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        margin-bottom: 8px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        color: var(--helios-text-secondary);
      }

      .nav-item:hover {
        background: rgba(255, 123, 84, 0.1);
        color: var(--helios-text-primary);
        transform: translateX(4px);
      }

      .nav-item.active {
        background: linear-gradient(
          135deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber)
        );
        color: white;
        box-shadow: 0 4px 16px rgba(255, 123, 84, 0.3);
      }

      .nav-item .icon {
        font-size: 20px;
        width: 24px;
        text-align: center;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        min-width: 0;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Loading indicator */
      .loading-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px;
        color: var(--helios-text-muted);
        font-size: 16px;
      }

      .loading-indicator::before {
        content: "";
        width: 24px;
        height: 24px;
        border: 3px solid var(--helios-border);
        border-top-color: var(--helios-accent-orange);
        border-radius: 50%;
        margin-right: 12px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Section Cards */
      .section-card {
        background: linear-gradient(
          145deg,
          var(--helios-bg-secondary) 0%,
          var(--helios-bg-tertiary) 100%
        );
        border-radius: 20px;
        padding: 32px;
        margin-bottom: 24px;
        border: 1px solid var(--helios-border);
        box-shadow: 0 8px 32px var(--helios-shadow);
        position: relative;
        overflow: hidden;
      }

      .section-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber),
          var(--helios-accent-yellow)
        );
        border-radius: 20px 20px 0 0;
      }

      .section-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--helios-text-primary);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .section-description {
        color: var(--helios-text-muted);
        margin-bottom: 24px;
        line-height: 1.6;
      }

      /* Form Elements */
      .form-group {
        margin-bottom: 24px;
      }

      .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 24px;
      }

      .form-row .form-group {
        flex: 1;
        margin-bottom: 0;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--helios-text-primary);
        margin-bottom: 8px;
      }

      .form-control {
        width: 100%;
        padding: 12px 16px;
        background: var(--helios-bg-primary);
        border: 2px solid var(--helios-border);
        border-radius: 12px;
        color: var(--helios-text-primary);
        font-family: inherit;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        outline: none;
        border-color: var(--helios-accent-orange);
        box-shadow: 0 0 0 4px rgba(255, 123, 84, 0.2);
      }

      .form-control option {
        background: var(--helios-bg-primary);
        color: var(--helios-text-primary);
      }

      /* Toggle Switch */
      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 56px;
        height: 28px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--helios-border);
        border-radius: 28px;
        transition: 0.3s;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 4px;
        bottom: 4px;
        background: white;
        border-radius: 50%;
        transition: 0.3s;
      }

      input:checked + .toggle-slider {
        background: var(--helios-accent-orange);
      }

      input:checked + .toggle-slider:before {
        transform: translateX(28px);
      }

      /* Status Indicators */
      .status-indicator {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .status-connected {
        background: rgba(76, 175, 80, 0.2);
        color: var(--helios-anki-success);
        border: 1px solid var(--helios-anki-success);
      }

      .status-disconnected {
        background: rgba(244, 67, 54, 0.2);
        color: var(--helios-anki-error);
        border: 1px solid var(--helios-anki-error);
      }

      .status-checking {
        background: rgba(158, 158, 158, 0.2);
        color: #9e9e9e;
        border: 1px solid #9e9e9e;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.7;
        }
        50% {
          opacity: 1;
        }
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        font-family: inherit;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber)
        );
        color: white;
        box-shadow: 0 4px 16px rgba(255, 123, 84, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 123, 84, 0.4);
      }

      .btn-secondary {
        background: var(--helios-bg-primary);
        color: var(--helios-text-secondary);
        border: 2px solid var(--helios-border);
      }

      .btn-secondary:hover {
        background: var(--helios-bg-tertiary);
        color: var(--helios-text-primary);
      }

      .btn-danger {
        background: linear-gradient(135deg, var(--helios-anki-error), #d32f2f);
        color: white;
      }

      .btn-success {
        background: linear-gradient(
          135deg,
          var(--helios-anki-success),
          #388e3c
        );
        color: white;
      }

      .btn-anki {
        background: linear-gradient(135deg, var(--helios-anki-blue), #1976d2);
        color: white;
      }

      /* Field Mapping Table */
      .mapping-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--helios-bg-primary);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 16px var(--helios-shadow);
      }

      .mapping-table th,
      .mapping-table td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid var(--helios-border);
      }

      .mapping-table th {
        background: var(--helios-bg-tertiary);
        font-weight: 700;
        color: var(--helios-text-primary);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .mapping-table td {
        color: var(--helios-text-secondary);
        font-size: 14px;
      }

      .mapping-table tr:last-child td {
        border-bottom: none;
      }

      .mapping-table tr:hover {
        background: rgba(255, 123, 84, 0.05);
      }

      .anki-field {
        font-weight: 600;
        color: var(--helios-anki-blue);
      }

      .preview-data {
        color: var(--helios-text-muted);
        font-style: italic;
      }

      /* Bulk Import */
      .bulk-textarea {
        width: 100%;
        min-height: 120px;
        padding: 16px;
        background: var(--helios-bg-primary);
        border: 2px solid var(--helios-border);
        border-radius: 12px;
        color: var(--helios-text-primary);
        font-family: "Courier New", monospace;
        font-size: 14px;
        resize: vertical;
        transition: all 0.3s ease;
      }

      .bulk-textarea:focus {
        outline: none;
        border-color: var(--helios-accent-orange);
        box-shadow: 0 0 0 4px rgba(255, 123, 84, 0.2);
      }

      .bulk-textarea::placeholder {
        color: var(--helios-text-muted);
      }

      /* Statistics */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: var(--helios-bg-primary);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        border: 1px solid var(--helios-border);
      }

      .stat-value {
        font-size: 32px;
        font-weight: 800;
        color: var(--helios-accent-orange);
        margin-bottom: 8px;
      }

      .stat-label {
        font-size: 14px;
        color: var(--helios-text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Help Text */
      .help-text {
        font-size: 13px;
        color: var(--helios-text-muted);
        margin-top: 8px;
        line-height: 1.5;
        padding: 12px 16px;
        background: rgba(255, 123, 84, 0.05);
        border-radius: 8px;
        border-left: 3px solid var(--helios-accent-orange);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .container {
          flex-direction: column;
          padding: 20px 16px;
        }

        .sidebar {
          width: 100%;
        }

        .nav-menu {
          display: flex;
          overflow-x: auto;
          padding: 16px;
        }

        .nav-item {
          flex-shrink: 0;
          margin-right: 8px;
          margin-bottom: 0;
        }

        .section-card {
          padding: 20px;
        }

        .form-row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Helios</h1>
      <div class="subtitle">Extension Settings</div>
    </div>

    <div class="container">
      <!-- Sidebar Navigation -->
      <div class="sidebar">
        <nav class="nav-menu">
          <div class="nav-item active" data-tab="general">
            <span class="icon">⚙️</span>
            <span>General</span>
          </div>
          <div class="nav-item" data-tab="popup">
            <span class="icon">💬</span>
            <span>Popup & Display</span>
          </div>
          <div class="nav-item" data-tab="anki">
            <span class="icon">📚</span>
            <span>Anki Integration</span>
          </div>
          <div class="nav-item" data-tab="vocabulary">
            <span class="icon">📝</span>
            <span>Vocabulary</span>
          </div>
          <div class="nav-item" data-tab="advanced">
            <span class="icon">🔧</span>
            <span>Advanced</span>
          </div>
        </nav>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- General Settings -->
        <div class="tab-content active" id="general">
          <div class="loading-indicator">Loading General Settings...</div>
        </div>

        <!-- Popup & Display Settings -->
        <div class="tab-content" id="popup">
          <div class="loading-indicator">Loading Popup Settings...</div>
        </div>

        <!-- Anki Integration -->
        <div class="tab-content" id="anki">
          <div class="loading-indicator">Loading Anki Settings...</div>
        </div>

        <!-- Vocabulary Management -->
        <div class="tab-content" id="vocabulary">
          <div class="loading-indicator">Loading Vocabulary Settings...</div>
        </div>

        <!-- Advanced Settings -->
        <div class="tab-content" id="advanced">
          <div class="loading-indicator">Loading Advanced Settings...</div>
        </div>
      </div>
    </div>

    <script src="src/helios-settings.js"></script>
  </body>
</html>
