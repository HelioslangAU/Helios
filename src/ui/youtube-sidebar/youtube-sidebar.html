<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helios YouTube Sidebar</title>
  <link rel="stylesheet" href="youtube-sidebar.css">
</head>
<body>
  <div class="helios-youtube-sidebar" id="helios-youtube-sidebar">
    <!-- Subtitle Section -->
    <div class="yt-subtitle-section">
      <div class="yt-section-header">
        <span>Subtitles</span>
        <span class="yt-subtitle-count" id="yt-subtitle-count">0</span>
      </div>
      <div class="yt-subtitle-list" id="yt-subtitle-list">
        <div class="yt-subtitle-empty">
          <div class="empty-icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              <line x1="9" y1="9" x2="15" y2="9"></line>
              <line x1="9" y1="13" x2="15" y2="13"></line>
            </svg>
          </div>
          <p>Subtitles will appear here</p>
          <small>Auto-loads based on your target language</small>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
