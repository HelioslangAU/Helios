<!-- General Settings Tab Content -->
<div class="section-card">
  <h2 class="section-title">
    <span>⚙️</span>
    Extension Control
  </h2>
  <p class="section-description">
    Configure basic extension behavior and activation settings.
  </p>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Extension Enabled</label>
      <label class="toggle-switch">
        <input type="checkbox" id="extension-enabled" checked />
        <span class="toggle-slider"></span>
      </label>
      <div class="help-text">Enable or disable the entire extension</div>
    </div>
    <div class="form-group">
      <label class="form-label">Activation Key</label>
      <select class="form-control" id="activation-key">
        <option value="Shift">Shift (Default)</option>
        <option value="Alt">Alt</option>
        <option value="Control">Ctrl</option>
        <option value="Meta">Cmd/Meta</option>
      </select>
      <div class="help-text">Key to hold for dictionary lookups</div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Target Language</label>
      <select class="form-control" id="target-language">
        <option value="zh">Chinese (中文)</option>
        <option value="en">English</option>
        <option value="es">Spanish (Español)</option>
        <option value="fr">French (Français)</option>
      </select>
      <div class="help-text">Select the language you want to learn</div>
    </div>
    <div class="form-group">
      <label class="form-label">Auto-highlight Unknown Words</label>
      <label class="toggle-switch">
        <input type="checkbox" id="auto-highlight" checked />
        <span class="toggle-slider"></span>
      </label>
      <div class="help-text">
        Automatically underline unknown words on page load
      </div>
    </div>
  </div>
</div>
