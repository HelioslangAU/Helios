<!-- Popup & Display Settings Tab Content -->
<div class="section-card">
  <h2 class="section-title">
    <span>💬</span>
    Popup Behavior
  </h2>
  <p class="section-description">
    Customize popup appearance and interaction behavior.
  </p>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Popup Theme</label>
      <select class="form-control" id="popup-theme">
        <option value="dark" selected>Dark (Default)</option>
        <option value="light">Light</option>
        <option value="auto">Auto (System)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Card Size</label>
      <select class="form-control" id="popup-font-size">
        <option value="small">Small</option>
        <option value="medium" selected>Medium (Default)</option>
        <option value="large">Large</option>
        <option value="extra-large">Extra Large</option>
      </select>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group full-width">
      <label class="form-label">Show Frequency</label>
      <label class="toggle-switch">
        <input type="checkbox" id="show-frequency" checked />
        <span class="toggle-slider"></span>
      </label>
      <div class="help-text">Display word frequency ranking in popup</div>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Persistent Popup</label>
      <label class="toggle-switch">
        <input type="checkbox" id="persistent-popup" checked />
        <span class="toggle-slider"></span>
      </label>
      <div class="help-text">
        Keep popup open after releasing activation key
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Auto-close Delay (s)</label>
      <input
        type="number"
        class="form-control"
        id="auto-close-delay"
        value="0"
        min="0"
        max="30"
      />
      <div class="help-text">Auto-close popup after delay (0 = disabled)</div>
    </div>
  </div>
</div>
