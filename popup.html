<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .header {
      background: linear-gradient(135deg, #4CAF50, #45a049);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    
    .content {
      padding: 16px;
    }
    
    .section {
      margin-bottom: 20px;
    }
    
    .section h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #333;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    
    .vocab-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
    }
    
    .vocab-item {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .vocab-item:last-child {
      border-bottom: none;
    }
    
    .vocab-word {
      font-weight: 500;
      color: #333;
    }
    
    .vocab-definition {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }
    
    .delete-btn {
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    
    .delete-btn:hover {
      background: #cc0000;
    }
    
    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .btn-primary {
      background: #4CAF50;
      color: white;
    }
    
    .btn-primary:hover {
      background: #45a049;
    }
    
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    
    .empty-state {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Language Learning</h1>
  </div>
  
  <div class="content">
    <div class="section">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="vocab-count">0</div>
          <div class="stat-label">Words Learned</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="session-count">0</div>
          <div class="stat-label">Today's Lookups</div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <h2>Recent Vocabulary</h2>
      <div class="vocab-list" id="vocab-list">
        <div class="empty-state">
          Start selecting words on web pages to build your vocabulary!
        </div>
      </div>
    </div>
    
    <div class="section">
      <h2>Bulk Update Known Words</h2>
      <textarea id="known-words-input" rows="4" style="width:100%;resize:vertical;box-sizing:border-box;" placeholder="Paste known words here, separated by space, comma, or new line"></textarea>
      <button class="btn btn-primary" id="update-known-words-btn" style="margin-top:8px;width:100%;">Update Known Words</button>
    </div>
    
    <div class="buttons">
      <button class="btn btn-secondary" id="export-btn">Export</button>
      <button class="btn btn-primary" id="review-btn">Review</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
