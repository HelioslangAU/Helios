<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --helios-bg-primary: #1a1a1a;
        --helios-bg-secondary: #222222;
        --helios-bg-tertiary: #2a2a2a;
        --helios-accent-orange: #ff7b54;
        --helios-accent-amber: #ffb347;
        --helios-accent-yellow: #ffd700;
        --helios-accent-peach: #ff9478;
        --helios-accent-warm: #ff8c42;
        --helios-known-teal: #20b2aa;
        --helios-text-primary: #ffffff;
        --helios-text-secondary: #f3f4f6;
        --helios-text-muted: #a1a1aa;
        --helios-border: #3a3a3a;
        --helios-soft-glow: rgba(255, 123, 84, 0.15);
        --helios-amber-glow: rgba(255, 179, 71, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 400px;
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: linear-gradient(
          135deg,
          var(--helios-bg-primary) 0%,
          var(--helios-bg-secondary) 50%,
          var(--helios-bg-primary) 100%
        );
        color: var(--helios-text-primary);
        overflow-x: hidden;
        border-radius: 0 0 20px 20px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(
          135deg,
          #ff6b35 0%,
          #ff8c42 25%,
          #ffb347 50%,
          #ffd700 75%,
          #ffeb3b 100%
        );
        color: white;
        padding: 32px 24px;
        text-align: center;
        position: relative;
        overflow: hidden;
        border-radius: 0 0 32px 32px;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(255, 140, 66, 0.4);
      }

      .header::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(255, 255, 255, 0.2) 0%,
          transparent 50%
        );
        animation: heliosHeaderGlow 4s ease-in-out infinite alternate;
      }

      @keyframes heliosHeaderGlow {
        0% {
          opacity: 0.7;
          transform: scale(1);
        }
        100% {
          opacity: 1;
          transform: scale(1.02);
        }
      }

      .header h1 {
        margin: 0 0 8px 0;
        font-size: 36px;
        font-weight: 800;
        position: relative;
        z-index: 1;
        text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        letter-spacing: 3px;
      }

      .header .subtitle {
        margin: 0;
        font-size: 14px;
        font-weight: 500;
        opacity: 0.95;
        position: relative;
        z-index: 1;
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      .content {
        padding: 0 24px 32px 24px;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: linear-gradient(
          135deg,
          var(--helios-bg-secondary) 0%,
          var(--helios-bg-tertiary) 100%
        );
        padding: 28px 20px;
        border-radius: 24px;
        text-align: center;
        border: 1px solid var(--helios-border);
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #ff6b35, #ff8c42, #ffb347, #ffd700);
        border-radius: 24px 24px 0 0;
      }

      .stat-card::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        background: radial-gradient(
          circle,
          rgba(255, 140, 66, 0.2) 0%,
          transparent 70%
        );
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .stat-card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 16px 40px rgba(255, 140, 66, 0.35);
        border-color: #ff8c42;
      }

      .stat-card:hover::after {
        opacity: 1;
      }

      .stat-number {
        font-size: 42px;
        font-weight: 800;
        background: linear-gradient(135deg, #ff6b35, #ff8c42, #ffb347, #ffd700);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 2px 4px rgba(255, 140, 66, 0.3));
      }

      .stat-label {
        font-size: 12px;
        color: var(--helios-text-muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        position: relative;
        z-index: 1;
      }

      .progress-section {
        background: linear-gradient(
          135deg,
          var(--helios-bg-secondary) 0%,
          var(--helios-bg-tertiary) 100%
        );
        border-radius: 28px;
        padding: 28px;
        border: 1px solid var(--helios-border);
        margin-bottom: 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden;
      }

      .progress-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber),
          var(--helios-accent-yellow)
        );
        border-radius: 28px 28px 0 0;
      }

      .progress-title {
        font-size: 16px;
        color: var(--helios-text-primary);
        margin-bottom: 16px;
        font-weight: 700;
      }

      .progress-bar {
        background: var(--helios-bg-primary);
        height: 12px;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber),
          var(--helios-accent-yellow)
        );
        border-radius: 12px;
        width: 0%;
        transition: width 1s ease;
        position: relative;
        box-shadow: 0 0 16px var(--helios-amber-glow);
      }

      .progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        animation: heliosProgressShimmer 3s infinite;
      }

      @keyframes heliosProgressShimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .progress-text {
        text-align: right;
        font-size: 13px;
        color: var(--helios-text-muted);
        margin-top: 12px;
        font-weight: 600;
      }

      .vocab-section {
        background: linear-gradient(
          135deg,
          var(--helios-bg-secondary) 0%,
          var(--helios-bg-tertiary) 100%
        );
        border-radius: 28px;
        border: 1px solid var(--helios-border);
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        margin-bottom: 32px;
      }

      .vocab-header {
        padding: 20px 28px;
        background: linear-gradient(
          135deg,
          var(--helios-bg-tertiary),
          var(--helios-bg-secondary)
        );
        border-bottom: 1px solid var(--helios-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .vocab-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--helios-text-primary);
      }

      .vocab-count {
        background: linear-gradient(135deg, #ff8c42, #ffb347, #ffd700);
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 12px rgba(255, 140, 66, 0.4);
      }

      .vocab-list {
        max-height: 280px;
        overflow-y: auto;
      }

      .vocab-list::-webkit-scrollbar {
        width: 8px;
      }

      .vocab-list::-webkit-scrollbar-track {
        background: var(--helios-bg-primary);
      }

      .vocab-list::-webkit-scrollbar-thumb {
        background: linear-gradient(
          180deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber)
        );
        border-radius: 8px;
      }

      .vocab-item {
        padding: 20px 28px;
        border-bottom: 1px solid var(--helios-border);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        transition: all 0.3s ease;
        position: relative;
      }

      .vocab-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(
          180deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber)
        );
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .vocab-item:hover {
        background: var(--helios-bg-primary);
        transform: translateX(4px);
      }

      .vocab-item:hover::before {
        opacity: 1;
      }

      .vocab-item:last-child {
        border-bottom: none;
      }

      .vocab-content {
        flex: 1;
      }

      .vocab-word {
        font-weight: 800;
        color: var(--helios-text-primary);
        font-size: 24px;
        margin-bottom: 8px;
        background: linear-gradient(
          135deg,
          var(--helios-accent-orange),
          var(--helios-accent-amber)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .vocab-definition {
        font-size: 14px;
        color: var(--helios-text-muted);
        line-height: 1.5;
      }

      .delete-btn {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
      }

      .delete-btn:hover {
        transform: scale(1.1) rotate(90deg);
        box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
      }

      .bulk-section {
        background: linear-gradient(
          135deg,
          var(--helios-bg-secondary) 0%,
          var(--helios-bg-tertiary) 100%
        );
        border-radius: 28px;
        padding: 28px;
        border: 1px solid var(--helios-border);
        margin-bottom: 32px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden;
      }

      .bulk-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--helios-known-teal), #20b2aa);
        border-radius: 28px 28px 0 0;
      }

      .bulk-section h2 {
        font-size: 16px;
        font-weight: 700;
        margin: 0 0 16px 0;
        color: var(--helios-text-primary);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .bulk-section h2::before {
        content: "";
        width: 4px;
        height: 20px;
        background: linear-gradient(135deg, var(--helios-known-teal), #20b2aa);
        border-radius: 2px;
      }

      .bulk-textarea {
        width: 100%;
        height: 90px;
        background: var(--helios-bg-primary);
        border: 2px solid var(--helios-border);
        border-radius: 16px;
        padding: 16px;
        color: var(--helios-text-primary);
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .bulk-textarea:focus {
        outline: none;
        border-color: var(--helios-known-teal);
        box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3),
          0 0 0 3px rgba(32, 178, 170, 0.2);
      }

      .bulk-textarea::placeholder {
        color: var(--helios-text-muted);
      }

      .buttons {
        display: flex;
        gap: 16px;
      }

      .btn {
        flex: 1;
        padding: 16px 24px;
        border: none;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        position: relative;
        overflow: hidden;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: left 0.8s ease;
      }

      .btn:hover::before {
        left: 100%;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--helios-known-teal),
          #20b2aa,
          #17a2b8
        );
        color: white;
        box-shadow: 0 8px 20px rgba(32, 178, 170, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 28px rgba(32, 178, 170, 0.4);
      }

      .btn-secondary {
        background: linear-gradient(135deg, var(--helios-bg-primary), #1f1f1f);
        color: var(--helios-text-secondary);
        border: 2px solid var(--helios-border);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      }

      .btn-secondary:hover {
        background: linear-gradient(
          135deg,
          #1f1f1f,
          var(--helios-bg-secondary)
        );
        color: var(--helios-text-primary);
        transform: translateY(-3px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
      }

      /* Entrance animation */
      @keyframes heliosPopupEntrance {
        from {
          opacity: 0;
          transform: scale(0.96) translateY(-20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      body {
        animation: heliosPopupEntrance 0.6s ease-out;
      }

      /* Floating elements animation */
      @keyframes heliosFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      .stat-card:nth-child(1) {
        animation: heliosFloat 4s ease-in-out infinite;
        animation-delay: 0s;
      }

      .stat-card:nth-child(2) {
        animation: heliosFloat 4s ease-in-out infinite;
        animation-delay: 0.5s;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Helios</h1>
      <div class="subtitle">Language Learning</div>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="vocab-count">4</div>
          <div class="stat-label">Words Learned</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="session-count">0</div>
          <div class="stat-label">Today's Lookups</div>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-title">Daily Goal Progress</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-text">0%</div>
      </div>

      <div class="vocab-section">
        <div class="vocab-header">
          <div class="vocab-title">Recent Vocabulary</div>
          <div class="vocab-count">2 total</div>
        </div>
        <div class="vocab-list" id="vocab-list">
          <div class="vocab-item">
            <div class="vocab-content">
              <div class="vocab-word">好</div>
              <div class="vocab-definition">
                good; appropriate; proper; all right!; (before a verb) easy to;
                (before a verb) good to; (before...
              </div>
            </div>
            <button class="delete-btn">×</button>
          </div>
          <div class="vocab-item">
            <div class="vocab-content">
              <div class="vocab-word">结巴</div>
              <div class="vocab-definition">to stutter</div>
            </div>
            <button class="delete-btn">×</button>
          </div>
        </div>
      </div>

      <div class="bulk-section">
        <h2>Bulk Update Known Words</h2>
        <textarea
          id="known-words-input"
          class="bulk-textarea"
          placeholder="Paste known words here, separated by space, comma, or new line"
        ></textarea>
        <button
          class="btn btn-primary"
          id="update-known-words-btn"
          style="width: 100%; margin-top: 16px"
        >
          Update Known Words
        </button>
      </div>

      <div class="buttons">
        <button class="btn btn-secondary" id="export-btn">Export</button>
        <button class="btn btn-primary" id="review-btn">Review</button>
      </div>
    </div>

    <script src="src/extensiontab.js"></script>
  </body>
</html>
